name: state_act_canonical_qvelmask

# VELOCITY-BLIND VARIANT of state_act_canonical — the falsification experiment
# for the velocity-shortcut Zeno-trap account (docs/absolute_action_autopsy.md
# §5). Identical to state_act_canonical in every training-relevant respect
# (same architecture, optimizer, seed, budget, selection protocol); the ONLY
# change is `observation.mask_feature_ranges`, which hard-zeroes qvel (state
# dims [7, 14)) inside the model at BOTH training and inference (the mask is
# applied in ACTModel at its two obs entry points and rides in the checkpoint
# config, so no dataset or adapter changes are involved). With history: 1 and
# no previous action, the policy is information-theoretically velocity-blind.
# Prediction under the shortcut account: on the absolute-joint dataset the
# stationary trap disappears and `latest` recovers to >= h8; on delta-EE
# (control) little changes. This is an ABLATION config, not a reference recipe.
observation:
  mode: state
  history: 1
  include_previous_action: false
  mask_feature_ranges: [[7, 14]]   # qvel — see docs/absolute_action_autopsy.md

action:
  prediction_horizon: 16     # chunk_size (num_queries), task-matched to the PushT / DP horizon
  execution_horizon: 8

model:
  type: act
  hidden_dim: 512
  latent_dim: 32
  n_heads: 8
  n_encoder_layers: 4
  n_decoder_layers: 7
  dim_feedforward: 3200
  dropout: 0.1
  pos_embedding: sinusoidal
  arch: detr                 # DETR-VAE layers: ReLU, post-norm, zero-target decoder w/ injected query pos

act:
  kl_weight: 10.0

normalization_method: standardize

training:
  seed: 0
  batch_size: 64
  learning_rate: 0.00001     # canonical ACT lr (1e-5)
  weight_decay: 0.0001
  use_ema: false             # canonical ACT evaluates best-val raw weights
  gradient_clip_norm: 1.0
  val_fraction: 0.1
  split_seed: 0
  mask_padded_actions: true
  episode_sampling: true               # reference ACT: 1 random-start window per episode per epoch
  max_epochs: 3000                     # epoch == #episodes here (episode_sampling); ~15k steps @ batch 64
  checkpoint_every: 500                # periodic snapshots for screening-based selection
  log_every: 50
  eval_every: 1000
