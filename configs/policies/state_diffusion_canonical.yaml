name: state_diffusion_canonical

# Authoritative Diffusion Policy (CNN U-Net, low-dim), faithful to
# real-stanford/diffusion_policy. Training noises with DDPM (100 steps,
# squaredcos_cap_v2, epsilon); inference defaults to DDIM-16 for speed (set
# inference_sampler: ddpm + inference_steps: 100 for the reference sampler).
observation:
  mode: state
  history: 2
  include_previous_action: false

action:
  prediction_horizon: 16
  execution_horizon: 8
  window_alignment: diffusion_policy   # chunk aligned to obs start; execute from idx H_o-1

model:
  type: conditional_unet_1d
  channels: [256, 512, 1024]           # canonical down_dims
  diffusion_embedding_dim: 256         # canonical step-embed dim
  kernel_size: 5                       # (n_groups=8 is the block default)
  cond_predict_scale: true             # official DP FiLM: out = scale*h + bias

diffusion:
  training_steps: 100
  beta_schedule: cosine                # squaredcos_cap_v2
  inference_sampler: ddim              # default fast sampler; ddpm+100 = reference baseline
  inference_steps: 16
  prediction_type: epsilon
  temperature: 1.0

training:
  seed: 0
  batch_size: 256
  learning_rate: 0.0001
  weight_decay: 0.000001
  adam_betas: [0.95, 0.999]            # canonical DP AdamW betas
  lr_scheduler: cosine
  lr_warmup_steps: 500
  ema:                                 # diffusers EMAModel power schedule
    power: 0.75
    inv_gamma: 1.0
    max_value: 0.9999
    min_value: 0.0
  gradient_clip_norm: 1.0
  val_fraction: 0.1
  split_seed: 0
  mask_padded_actions: false           # DP-style edge-replicated padding, trained unmasked
  max_epochs: 500                      # dataset-adaptive budget (pilot-calibratable); checkpoint selection captures the peak
  checkpoint_every: 1000               # periodic snapshots for screening-based selection
  log_every: 50
  eval_every: 1000
