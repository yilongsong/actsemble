# PickCube-v1 dataset-size (n_demos) selection — protocol §7, DEV TIER.
# Goal: find the n_demos operating point where the selected lightweight-DP
# policy lands at ~50% success (target band [0.40, 0.60], centered on 0.50 —
# unlike the PushT default's [0.25, 0.50]). 2 policy seeds for the search
# pass; re-run with >= 5 seeds before any claim. candidate_sizes are nested
# deterministic subsets of the 1100-episode RL demo pool (see
# configs/data/pickcube.yaml); if no size lands in band, extend the list
# (down to 5 or up past 100) and rerun — the driver reuses finished cells.
experiment_version: pickcube_ndemos_v1

dataset: outputs/pickcube/teleop_v1/teleop_100.h5   # DEFAULT pool, see configs/data/pickcube_teleop.yaml
policy_config: configs/policies/state_diffusion.yaml
verifier_config: configs/components/action_chunk_compatibility.yaml

policy_config_overrides:
  training:
    max_steps: 30000          # fixed budget, no early stopping (§4)
    checkpoint_every: 2000    # snapshot + screening interval (§4, §5)

verifier_config_overrides:
  training:
    max_steps: 8000
    checkpoint_every: 500

policy_seeds: [0, 1]          # DEV-tier search; >= 5 seeds for claims (§14)
verifier_seed_pairing: same_as_policy

panels:                        # §1; pairwise disjoint (env-seed roots)
  screening:                 {env_seed: 2000, num_episodes: 50}
  confirmation:              {env_seed: 3500, num_episodes: 200}
  integration:               {env_seed: 4500, num_episodes: 10}
  final_test:                {env_seed: 1000, num_episodes: 500}
  dataset_size_development:  {env_seed: 5500, num_episodes: 200}

episode_max_steps: 160        # The horizon must scale with the DEMONSTRATOR.
                              # Old RL bundle: demos 19-29 steps, 50 was generous.
                              # Default pool is now the teleop-like one
                              # (configs/data/pickcube_teleop.yaml), whose demos
                              # run 38-110 steps (median 65, p95 106) because
                              # the approach is deliberately slow. At 50 steps a
                              # policy imitating it cannot finish and would score
                              # ~0. 160 = p95 x 1.5, set from the measured length
                              # distribution rather than a round number.

confirmation_rule:
  top_k: 5
  within_of_best: 0.10

verifier_selection:
  primary: pairwise_ranking_accuracy
  secondary: balanced_accuracy

paired_num_candidates: 16

final_regimes:
  - {name: nominal, max_steps: 100, perturbations: []}

dataset_size_selection:       # §7
  target_success_range: [0.40, 0.60]
  # Sweep for the teleop-like demonstrator (configs/data/pickcube_teleop.yaml).
  # NOTE 150 > the current pool of 100 episodes: regenerate at --n 200 first,
  #   python scripts/generate_pickcube_teleop.py --n 200 --descent-cap 0.30 \
  #     --noise-sigma 0.15 --align-tol 0.014 --max-steps 110 \
  #     --out outputs/pickcube/teleop_v1/teleop_200.h5
  # then cut nested subsets with scripts/subset_dataset.py. The generator walks
  # env seeds sequentially from one RNG, so a longer run should reproduce the
  # first 100 episodes exactly -- VERIFY that (compare per-episode hashes)
  # before treating teleop_100 results as cells of the same sweep.
  # Measured so far on this demonstrator (screening panel, 50 ep, horizon 160):
  #   n=100 -> plateau 76-82%, well ABOVE the target band
  #   n=50  -> 40% at step 2000 vs n=100's 58% at the same step (in progress)
  # so the operating point is expected at a SMALLER n than the RL bundle needed.
  candidate_sizes: [10, 25, 50, 100, 150]
  subset_seed: 0
