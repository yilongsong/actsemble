# Trusted default recipe (protocol §18). Values may be edited BEFORE an
# experiment begins; `run_protocol.py init` freezes this file into the
# experiment directory and every later stage reads only the frozen copy.
experiment_version: v1

dataset: data/push_t_pilot.h5
policy_config: configs/policies/state_diffusion.yaml
verifier_config: configs/components/action_chunk_compatibility.yaml

policy_config_overrides:
  training:
    max_steps: 30000          # fixed budget, no early stopping (§4)
    checkpoint_every: 2000    # snapshot + screening interval (§4, §5)

verifier_config_overrides:
  training:
    max_steps: 8000           # fixed budget (§8)
    checkpoint_every: 500     # snapshot + offline-validation interval (§8-§9)

policy_seeds: [0, 1, 2, 3, 4] # >= 5 seeds for final claims (§14)
verifier_seed_pairing: same_as_policy

panels:                        # §1; must stay pairwise disjoint
  screening:                 {env_seed: 2000, num_episodes: 50}
  confirmation:              {env_seed: 3500, num_episodes: 200}
  integration:               {env_seed: 4500, num_episodes: 10}
  final_test:                {env_seed: 1000, num_episodes: 500}
  dataset_size_development:  {env_seed: 5500, num_episodes: 200}

episode_max_steps: 100

confirmation_rule:            # §6
  top_k: 5
  within_of_best: 0.10

verifier_selection:           # §9 (offline only)
  primary: pairwise_ranking_accuracy
  secondary: balanced_accuracy

paired_num_candidates: 16     # K shared by all systems in paired mode (§11)

final_regimes:                # §13; declared before freezing
  - {name: nominal, max_steps: 100, perturbations: []}

dataset_size_selection:       # §7
  target_success_range: [0.25, 0.50]
  candidate_sizes: [50, 100, 200, 400, 719]
  subset_seed: 0
